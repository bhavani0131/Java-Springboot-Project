name: Java Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**' # Only runs when files inside the backend folder change

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # We tell maven to run specifically inside the backend directory
      run: mnv -f backend/pom.xml clean package -DskipTests

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /root/Java-Springboot-Project/backend
          git pull origin main
          mvn clean package -DskipTests
          sudo systemctl restart datastore-backend
          sudo systemctl status datastore-backend
